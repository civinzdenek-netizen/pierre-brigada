<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Pierre Design · Přehled balíků</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#1A1714;--stone:#3D3630;--muted:#8A7F78;--line:rgba(138,127,120,0.18);--bg:#F7F3EE;--card:#FDFBF8;--gold:#B8894A;--gold-light:#E8C98A;--green:#4A7A5A;--red:#8B3A3A;--blue:#3A5A8B;--orange:#8B6000;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;min-height:-webkit-fill-available;overscroll-behavior:none;}
#login{min-height:100vh;min-height:-webkit-fill-available;display:flex;flex-direction:column;justify-content:center;padding:32px 24px 48px;background:var(--ink);position:relative;overflow:hidden;}
#login::before{content:'';position:absolute;top:-80px;right:-80px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(184,137,74,.2) 0%,transparent 70%);pointer-events:none;}
.login-brand{font-family:'Fraunces',serif;font-size:36px;font-weight:300;color:#fff;letter-spacing:-1px;margin-bottom:4px;}
.login-brand em{color:var(--gold-light);font-style:italic;}
.login-sub{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:8px;font-weight:300;}
.login-role{display:inline-block;background:rgba(184,137,74,.2);color:var(--gold-light);font-size:11px;font-weight:500;padding:4px 10px;border-radius:6px;letter-spacing:.8px;text-transform:uppercase;margin-bottom:36px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:10px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:8px;}
.field input{width:100%;padding:16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:16px;outline:none;transition:border-color .2s;-webkit-appearance:none;}
.field input::placeholder{color:rgba(255,255,255,.25);}
.field input:focus{border-color:var(--gold);background:rgba(255,255,255,.1);}
.btn-connect{width:100%;padding:18px;background:var(--gold);color:#fff;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;cursor:pointer;margin-top:8px;transition:opacity .2s,transform .1s;}
.btn-connect:active{transform:scale(.98);opacity:.9;}
.btn-connect:disabled{opacity:.5;}
.login-error{margin-top:16px;padding:14px 16px;background:rgba(139,58,58,.2);border:1px solid rgba(139,58,58,.3);border-radius:10px;font-size:13px;color:#ffaaaa;display:none;}
#app{display:none;flex-direction:column;min-height:100vh;min-height:-webkit-fill-available;}
.app-header{background:var(--ink);padding:16px 20px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;flex-shrink:0;}
.header-brand{font-family:'Fraunces',serif;font-size:20px;font-weight:300;color:#fff;letter-spacing:-.5px;}
.header-brand em{color:var(--gold-light);font-style:italic;}
.header-count{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px;font-weight:300;}
.header-right{display:flex;gap:10px;align-items:center;}
.btn-icon{width:38px;height:38px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:rgba(255,255,255,.7);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-icon.spinning{animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.filter-bar{background:var(--card);border-bottom:1px solid var(--line);padding:12px 16px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-chip{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid var(--line);background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
.filter-chip.active{background:var(--ink);border-color:var(--ink);color:#fff;}
.search-wrap{padding:12px 16px 8px;background:var(--bg);flex-shrink:0;position:relative;}
.search-input{width:100%;padding:12px 16px 12px 40px;background:var(--card);border:1.5px solid var(--line);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none;-webkit-appearance:none;}
.search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted);pointer-events:none;}
.orders-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 16px 32px;}
.order-card{background:var(--card);border-radius:16px;border:1px solid var(--line);margin-bottom:10px;overflow:hidden;cursor:pointer;}
.order-card:active{transform:scale(.99);}
.order-card-main{padding:16px;display:flex;align-items:flex-start;gap:12px;}
.order-number-badge{background:var(--ink);color:var(--gold-light);font-family:'Fraunces',serif;font-size:13px;font-weight:300;padding:6px 10px;border-radius:8px;white-space:nowrap;flex-shrink:0;}
.order-info{flex:1;min-width:0;}
.order-name{font-size:15px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.order-meta{font-size:12px;color:var(--muted);font-weight:300;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.order-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.tracking-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(74,122,90,.1);color:var(--green);font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;}
.status{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:500;white-space:nowrap;}
.status::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;}
.s-new{background:rgba(58,90,139,.1);color:var(--blue);}
.s-confirmed,.s-processing{background:rgba(139,96,0,.1);color:var(--orange);}
.s-shipped,.s-done{background:rgba(74,122,90,.1);color:var(--green);}
.s-cancelled{background:rgba(139,58,58,.1);color:var(--red);}
.s-default{background:rgba(138,127,120,.1);color:var(--muted);}
.order-detail{display:none;border-top:1px solid var(--line);padding:16px;background:rgba(247,243,238,.6);animation:slideDown .2s ease;}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.order-detail.open{display:block;}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px;}
.detail-row:last-child{border-bottom:none;}
.detail-row label{color:var(--muted);font-weight:300;flex-shrink:0;margin-right:12px;}
.detail-row value{color:var(--ink);text-align:right;}
.detail-section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:12px 0 4px;border-bottom:1px solid var(--line);margin-bottom:2px;}
.items-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:14px 0 8px;}
.item-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);}
.item-row:last-child{border-bottom:none;}
.item-img{width:44px;height:44px;border-radius:8px;object-fit:cover;background:var(--bg);flex-shrink:0;border:1px solid var(--line);}
.item-img-placeholder{width:44px;height:44px;border-radius:8px;background:var(--bg);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.item-info{flex:1;min-width:0;}
.item-name{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-code{font-size:11px;color:var(--muted);margin-top:1px;}
.item-qty{font-size:12px;color:var(--muted);text-align:right;flex-shrink:0;}
.note-section{margin-top:14px;}
.note-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;}
.note-textarea{width:100%;padding:12px;background:var(--card);border:1.5px solid var(--line);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);outline:none;resize:none;min-height:72px;line-height:1.5;transition:border-color .2s;}
.note-textarea:focus{border-color:var(--gold);}
.tracking-input{width:100%;padding:11px 12px;background:var(--card);border:1.5px solid var(--line);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none;letter-spacing:.5px;transition:border-color .2s;-webkit-appearance:none;margin-top:0;}
.tracking-input:focus{border-color:var(--green);}
.btn-save-note{width:100%;margin-top:10px;padding:13px;background:var(--ink);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;}
.btn-save-note:active{opacity:.8;}
.btn-save-note:disabled{opacity:.4;cursor:not-allowed;}
.save-feedback{text-align:center;font-size:12px;margin-top:8px;height:16px;}
.save-feedback.ok{color:var(--green);}
.save-feedback.err{color:var(--red);}
.state-center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;text-align:center;color:var(--muted);}
.loader{width:32px;height:32px;border:2.5px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;box-shadow:0 8px 32px rgba(0,0,0,.25);z-index:200;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.ok{background:var(--green);}
.toast.err{background:var(--red);}
@supports (padding-bottom:env(safe-area-inset-bottom)){
  .orders-list{padding-bottom:calc(32px + env(safe-area-inset-bottom));}
  .app-header{padding-top:calc(16px + env(safe-area-inset-top));}
}
</style>
</head>
<body>
<div id="login">
  <div class="login-brand">Pierre <em>Design</em></div>
  <div class="login-sub">Správa objednávek</div>
  <div class="login-role">Brigádník</div>
  <div class="field"><label>API Login</label><input type="text" id="l-login" inputmode="numeric" value="94512426"/></div>
  <div class="field"><label>API Klíč</label><input type="password" id="l-key" placeholder="••••••••••••••••"/></div>
  <div class="field"><label>API URL</label><input type="url" id="l-url" inputmode="url" value="https://pierre-design.admin.s8.upgates.com/api/v2"/></div>
  <button class="btn-connect" id="btn-connect" onclick="connect()">Připojit</button>
  <div class="login-error" id="login-error"></div>
</div>
<div id="app">
  <header class="app-header">
    <div><div class="header-brand">Pierre <em>Design</em></div><div class="header-count" id="header-count">Načítám…</div></div>
    <div class="header-right">
      <button class="btn-icon" id="btn-refresh" onclick="refresh()">↻</button>
      <button class="btn-icon" onclick="logout()">✕</button>
    </div>
  </header>
  <div class="filter-bar" id="filter-bar"><button class="filter-chip active" onclick="setFilter('',this)">Vše</button></div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search" placeholder="Hledat jméno, číslo, podací kód…" oninput="applyFilters()" style="padding-left:40px;"/>
  </div>
  <div class="orders-list" id="orders-list"><div class="state-center"><div class="loader"></div><div style="font-size:15px;font-weight:300;">Načítám objednávky…</div></div></div>
</div>
<div class="toast" id="toast"></div>
<script>
const PROXY='https://brigadnik-production.up.railway.app/proxy';
const NOTES_URL='https://brigadnik-production.up.railway.app/notes';
let apiLogin='',apiKey='',apiUrl='';
let allOrders=[],allNotes={};
let activeFilter='',openCardId=null;
 
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(type||'');setTimeout(()=>t.className='toast',3000);}
function saveCredentials(){localStorage.setItem('pd_b_login',apiLogin);localStorage.setItem('pd_b_key',apiKey);localStorage.setItem('pd_b_url',apiUrl);}
function loadCredentials(){return{login:localStorage.getItem('pd_b_login')||'',key:localStorage.getItem('pd_b_key')||'',url:localStorage.getItem('pd_b_url')||''};}
function clearCredentials(){localStorage.removeItem('pd_b_login');localStorage.removeItem('pd_b_key');localStorage.removeItem('pd_b_url');}
 
async function apiGet(endpoint){
  const base=apiUrl.replace(/\/$/,'');
  const target=base+'/'+endpoint;
  const auth='Basic '+btoa(apiLogin+':'+apiKey);
  const r=await fetch(PROXY+'?url='+encodeURIComponent(target)+'&auth='+encodeURIComponent(auth));
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}
 
async function fetchOrders(){
  let page=1,items=[],hasMore=true;
  while(hasMore){
    if(page>1) await new Promise(r=>setTimeout(r,350));
    const data=await apiGet('orders?page='+page);
    const rows=data.orders||[];
    items=items.concat(rows);
    const total=data.number_of_pages||1;
    if(page>=total||rows.length===0) hasMore=false; else page++;
    if(page>100) break;
  }
  items.sort((a,b)=>new Date(b.creation_time)-new Date(a.creation_time));
  return items;
}
 
async function fetchNotes(){
  try{const r=await fetch(NOTES_URL);if(r.ok) allNotes=await r.json();}catch(e){allNotes={};}
}
 
async function saveNote(orderId){
  const noteEl=document.getElementById('note-'+orderId);
  const trackEl=document.getElementById('track-'+orderId);
  const btn=document.getElementById('savebtn-'+orderId);
  const fb=document.getElementById('fb-'+orderId);
  if(!noteEl||!trackEl) return;
  btn.disabled=true; fb.textContent=''; fb.className='save-feedback';
  try{
    const r=await fetch(NOTES_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({orderId:String(orderId),note:noteEl.value,trackingCode:trackEl.value})});
    if(!r.ok) throw new Error('HTTP '+r.status);
    allNotes[String(orderId)]={note:noteEl.value,tracking_code:trackEl.value};
    fb.textContent='Uloženo'; fb.className='save-feedback ok';
    const badge=document.getElementById('tbadge-'+orderId);
    if(badge){if(trackEl.value.trim()){badge.textContent='📦 '+trackEl.value.trim();badge.style.display='inline-flex';}else badge.style.display='none';}
    setTimeout(()=>{fb.textContent='';btn.disabled=false;},2000);
  }catch(e){fb.textContent='Chyba: '+e.message;fb.className='save-feedback err';btn.disabled=false;}
}
 
function statusClass(s){
  if(!s) return 's-default';
  const l=s.toLowerCase();
  if(l.includes('nov')) return 's-new';
  if(l.includes('potvr')||l.includes('zpracov')) return 's-confirmed';
  if(l.includes('odeslán')||l.includes('shipped')) return 's-shipped';
  if(l.includes('dokončen')||l.includes('complet')) return 's-done';
  if(l.includes('zrušen')||l.includes('cancel')) return 's-cancelled';
  return 's-default';
}
 
function formatDate(dt){
  if(!dt) return '-';
  const d=new Date(dt),now=new Date(),diff=now-d;
  if(diff<86400000) return 'Dnes '+d.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});
  if(diff<172800000) return 'Včera';
  return d.toLocaleDateString('cs-CZ',{day:'numeric',month:'short',year:'numeric'});
}
 
function buildFilters(){
  const statuses=[...new Set(allOrders.map(o=>o.status).filter(Boolean))];
  const bar=document.getElementById('filter-bar');
  bar.innerHTML='<button class="filter-chip'+(activeFilter?'':' active')+'" onclick="setFilter(\'\',this)">Vše <small style="opacity:.6">'+allOrders.length+'</small></button>';
  statuses.forEach(s=>{
    const count=allOrders.filter(o=>o.status===s).length;
    bar.innerHTML+='<button class="filter-chip'+(activeFilter===s?' active':'')+'" onclick="setFilter(\''+s.replace(/'/g,"\\'")+'\',this)">'+s+' <small style="opacity:.6">'+count+'</small></button>';
  });
}
 
function setFilter(status,btn){
  activeFilter=status;
  document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}
 
function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=allOrders.filter(o=>{
    const c=o.customer||{};
    const name=((o.firstname_invoice||c.firstname_invoice||'')+' '+(o.surname_invoice||c.surname_invoice||'')).toLowerCase();
    const num=String(o.order_number||'').toLowerCase();
    const email=(c.email||'').toLowerCase();
    const oid=String(o.order_number||o.order_id||'');
    const track=((allNotes[oid]||{}).tracking_code||'').toLowerCase();
    return(!q||name.includes(q)||num.includes(q)||email.includes(q)||track.includes(q))&&(!activeFilter||o.status===activeFilter);
  });
  renderOrders(filtered);
}
 
function renderOrders(orders){
  orders=orders||allOrders;
  const list=document.getElementById('orders-list');
  document.getElementById('header-count').textContent=orders.length+' objednávek';
  if(!orders.length){list.innerHTML='<div class="state-center"><div style="font-size:48px;opacity:.5;margin-bottom:16px;">📦</div><div style="font-size:15px;font-weight:300;">Žádné objednávky</div></div>';return;}
  let html='';
  orders.forEach(function(o){
    const id=String(o.order_number||o.order_id);
    const c=o.customer||{};
    const fn=o.firstname_invoice||c.firstname_invoice||'';
    const ln=o.surname_invoice||c.surname_invoice||'';
    const fullName=(fn+' '+ln).trim();
    const name=fullName||c.email||'-';
    const email=c.email||'';
    const phone=c.phone||'';
    const date=formatDate(o.creation_time);
    const sc=statusClass(o.status);
    const status=o.status||'-';
    const shipment=(o.shipment&&o.shipment.name)||'-';
    const payment=(o.payment&&o.payment.name)||'';
    const dStreet=o.street_postal||c.street_postal||o.street_invoice||c.street_invoice||'';
    const dZip=o.zip_postal||c.zip_postal||o.zip_invoice||c.zip_invoice||'';
    const dCity=o.city_postal||c.city_postal||o.city_invoice||c.city_invoice||'';
    const savedNote=(allNotes[id]||{}).note||'';
    const savedTrack=(allNotes[id]||{}).tracking_code||'';
 
    let itemsHtml='';
    if(o.products&&o.products.length){
      itemsHtml='<div class="items-title">Položky objednávky</div>';
      o.products.forEach(function(p){
        const pImg=p.image_url||'';
        const pName=p.title||p.name||'-';
        const pCode=p.code||'';
        const pQty=p.count||p.quantity||1;
        itemsHtml+='<div class="item-row">';
        if(pImg) itemsHtml+='<img class="item-img" src="'+pImg+'" onerror="this.style.display=\'none\'">';
        else itemsHtml+='<div class="item-img-placeholder">📦</div>';
        itemsHtml+='<div class="item-info"><div class="item-name">'+pName+'</div>';
        if(pCode) itemsHtml+='<div class="item-code">SKU: '+pCode+'</div>';
        itemsHtml+='</div><div class="item-qty">'+pQty+' ks</div></div>';
      });
    }
 
    html+='<div class="order-card" id="card-'+id+'">';
    html+='<div class="order-card-main" onclick="toggleCard(\''+id+'\')">';
    html+='<div class="order-number-badge">#'+id+'</div>';
    html+='<div class="order-info">';
    html+='<div class="order-name">'+name+'</div>';
    html+='<div class="order-meta"><span>'+date+'</span>';
    if(savedTrack) html+='<span id="tbadge-'+id+'" class="tracking-badge">📦 '+savedTrack+'</span>';
    else html+='<span id="tbadge-'+id+'" class="tracking-badge" style="display:none"></span>';
    html+='</div></div>';
    html+='<div class="order-right"><span class="status '+sc+'">'+status+'</span></div>';
    html+='</div>';
 
    html+='<div class="order-detail" id="detail-'+id+'">';
    if(fullName) html+='<div class="detail-row"><label>Jméno</label><value>'+fullName+'</value></div>';
    if(email) html+='<div class="detail-row"><label>E-mail</label><value>'+email+'</value></div>';
    if(phone) html+='<div class="detail-row"><label>Telefon</label><value>'+phone+'</value></div>';
    if(dStreet){
      html+='<div class="detail-section-title">Doručovací adresa</div>';
      html+='<div class="detail-row"><label>Ulice</label><value>'+dStreet+'</value></div>';
      html+='<div class="detail-row"><label>Město</label><value>'+dZip+' '+dCity+'</value></div>';
    }
    html+='<div class="detail-section-title">Doprava a platba</div>';
    html+='<div class="detail-row"><label>Doprava</label><value>'+shipment+'</value></div>';
    if(payment) html+='<div class="detail-row"><label>Platba</label><value>'+payment+'</value></div>';
    html+=itemsHtml;
 
    html+='<div class="note-section">';
    html+='<div class="detail-section-title">Poznámka &amp; podací kód</div>';
    html+='<div class="note-label">Poznámka</div>';
    html+='<textarea class="note-textarea" id="note-'+id+'" placeholder="Sem napište poznámku k objednávce…">'+savedNote+'</textarea>';
    html+='<div class="note-label" style="margin-top:12px;">Podací kód zásilky</div>';
    html+='<input class="tracking-input" id="track-'+id+'" type="text" placeholder="např. DR123456789CZ" value="'+savedTrack+'"/>';
    html+='<button class="btn-save-note" id="savebtn-'+id+'" onclick="saveNote(\''+id+'\')">Uložit</button>';
    html+='<div class="save-feedback" id="fb-'+id+'"></div>';
    html+='</div></div></div>';
  });
  list.innerHTML=html;
}
 
function toggleCard(id){
  const detail=document.getElementById('detail-'+id);
  if(!detail) return;
  const isOpen=detail.classList.contains('open');
  if(openCardId&&openCardId!==id){const prev=document.getElementById('detail-'+openCardId);if(prev) prev.classList.remove('open');}
  detail.classList.toggle('open',!isOpen);
  openCardId=isOpen?null:id;
  if(!isOpen) setTimeout(()=>document.getElementById('card-'+id).scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}
 
async function connect(){
  apiLogin=document.getElementById('l-login').value.trim();
  apiKey=document.getElementById('l-key').value.trim();
  apiUrl=document.getElementById('l-url').value.trim();
  if(!apiLogin||!apiKey||!apiUrl){showLoginError('Vyplňte prosím všechna pole.');return;}
  const btn=document.getElementById('btn-connect');
  btn.disabled=true;btn.textContent='Připojuji…';hideLoginError();
  try{
    await fetchNotes();
    allOrders=await fetchOrders();
    saveCredentials();
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='flex';
    buildFilters();renderOrders();
    toast('Připojeno · '+allOrders.length+' objednávek','ok');
  }catch(e){showLoginError('Chyba připojení: '+e.message);btn.disabled=false;btn.textContent='Připojit';}
}
 
async function refresh(){
  const btn=document.getElementById('btn-refresh');btn.classList.add('spinning');
  try{await fetchNotes();allOrders=await fetchOrders();buildFilters();applyFilters();toast('Obnoveno','ok');}
  catch(e){toast('Chyba: '+e.message,'err');}
  btn.classList.remove('spinning');
}
 
function logout(){
  clearCredentials();apiLogin='';apiKey='';apiUrl='';allOrders=[];allNotes={};
  document.getElementById('login').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('btn-connect').disabled=false;
  document.getElementById('btn-connect').textContent='Připojit';
}
 
function showLoginError(msg){const el=document.getElementById('login-error');el.textContent=msg;el.style.display='block';}
function hideLoginError(){document.getElementById('login-error').style.display='none';}
 
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&document.getElementById('login').style.display!=='none') connect();});
 
document.addEventListener('DOMContentLoaded',async function(){
  const creds=loadCredentials();
  if(creds.login&&creds.key&&creds.url){
    apiLogin=creds.login;apiKey=creds.key;apiUrl=creds.url;
    document.getElementById('l-login').value=creds.login;
    document.getElementById('l-key').value=creds.key;
    document.getElementById('l-url').value=creds.url;
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('orders-list').innerHTML='<div class="state-center"><div class="loader"></div><div style="font-size:15px;font-weight:300;">Načítám objednávky…</div></div>';
    try{
      await fetchNotes();allOrders=await fetchOrders();buildFilters();renderOrders();
      toast(allOrders.length+' objednávek','ok');
    }catch(e){
      clearCredentials();
      document.getElementById('login').style.display='flex';
      document.getElementById('app').style.display='none';
      showLoginError('Relace vypršela, přihlaste se znovu.');
    }
  }
});
</script>
</body>
